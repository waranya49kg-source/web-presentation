<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fleet - บันทึกข้อมูล</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--background); color: var(--text-main); margin: 0; padding: 0; }
        .navbar { background-color: #0f172a; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .navbar-brand { font-size: 18px; font-weight: 700; }
        .nav-links { display: flex; gap: 10px; }
        .nav-link { color: #94a3b8; text-decoration: none; padding: 8px 16px; font-size: 14px; font-weight: 600; border-radius: 6px; transition: all 0.2s; }
        .nav-link:hover { color: white; background-color: #1e293b; }
        .nav-link.active { color: white; background-color: var(--primary); }
        .main-content { padding: 40px 20px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 18px rgba(15, 23, 42, 0.04); border: 1px solid var(--border); }
        h2 { font-size: 20px; font-weight: 600; margin-top: 0; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 14px; background-color: #fcfdfe; }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); background-color: #fff; }
        
        button { color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 15px; font-weight: 600; transition: all 0.2s; margin-top: 10px; }
        .btn-submit { background-color: var(--primary); }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-update { background-color: var(--warning); color: #0f172a; }
        .btn-update:hover { background-color: #d97706; }
        
        .alert-success { background-color: #ecfdf5; color: #065f46; padding: 12px; border-radius: 8px; border: 1px solid #a7f3d0; margin-bottom: 15px; text-align: center; font-size: 14px; display: none; }
        .hint-text { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: block; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">🚚 Smart Fleet Analytics</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link active">📝 บันทึกข้อมูลการวิ่งรถ</a>
            <a href="history.html" class="nav-link">📋 ประวัติแจ้งเตือนซ่อมบำรุง</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="alert-success" id="successAlert">🎉 บันทึกข้อมูลสำเร็จ! และอัปเดตไปยังระบบคลังประวัติแล้ว</div>
        
        <div class="card">
            <h2 id="formTitle">📝 บันทึกข้อมูลการวิ่งรถและเลขไมล์</h2>
            <form id="fleetForm">
                <div class="form-group">
                    <label for="carId">หมายเลขทะเบียนรถ</label>
                    <input type="text" id="carId" required placeholder="เช่น รล-5501">
                    <span id="mileHint" class="hint-text"></span>
                </div>
                <div class="form-group">
                    <label for="carType">ประเภทรถยนต์</label>
                    <select id="carType">
                        <option value="รถบรรทุก 6 ล้อ">รถบรรทุก 6 ล้อ</option>
                        <option value="รถกระบะตรวจการ">รถกระบะตรวจการ</option>
                        <option value="รถเอนกประสงค์">รถตู้/รถเอนกประสงค์</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="currentOdometer">เลขไมล์ปัจจุบัน (กิโลเมตร)</label>
                    <input type="number" id="currentOdometer" min="1" required placeholder="เช่น 45200">
                </div>
                <div class="form-group">
                    <label for="distance">ระยะทางที่วิ่งในรอบนี้ (กิโลเมตร)</label>
                    <input type="number" id="distance" min="1" required placeholder="เช่น 120">
                </div>
                <div class="form-group">
                    <label for="fuel">ปริมาณน้ำมันที่ใช้ในรอบนี้ (ลิตร)</label>
                    <input type="number" id="fuel" min="1" required placeholder="เช่น 10">
                </div>
                <button type="submit" id="submitBtn" class="btn-submit">บันทึกข้อมูลและส่งรายงาน</button>
            </form>
        </div>
    </div>

    <script>
        let editIndex = -1; // -1 แปลว่าโหมดบันทึกใหม่ปกติ

        // ฟังก์ชันเริ่มตรวจสอบโหมดการทำงานเมื่อเปิดหน้าเว็บ (เช่น ตรวจสอบว่าถูกลิงก์ส่งตัวมาให้แก้ไขข้อมูลหรือไม่)
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit');
            
            if (editId !== null) {
                editIndex = parseInt(editId);
                let fleetData = JSON.parse(localStorage.getItem('fleetLogs')) || [];
                
                if (fleetData[editIndex]) {
                    const item = fleetData[editIndex];
                    // ยัดข้อมูลเก่าคืนฟอร์มเพื่อเตรียมแก้ไข
                    document.getElementById('carId').value = item.carId;
                    document.getElementById('carType').value = item.carType;
                    document.getElementById('currentOdometer').value = item.currentOdometer;
                    document.getElementById('distance').value = item.distance;
                    document.getElementById('fuel').value = item.fuel;
                    
                    // ปรับหน้าตาฟอร์มให้เป็นโหมดแก้ไข
                    document.getElementById('formTitle').innerText = "✏️ แก้ไขรายงานข้อมูลรถ " + item.carId;
                    const submitBtn = document.getElementById('submitBtn');
                    submitBtn.innerText = "อัปเดตข้อมูลการแก้ไข";
                    submitBtn.className = "btn-update";
                }
            }
        };

        // ระบบ Auto-fill ตรวจหาประวัติเลขไมล์ล่าสุดเมื่อผู้ใช้งานกรอกเลขทะเบียนรถเดิม
        document.getElementById('carId').addEventListener('input', function() {
            if (editIndex !== -1) return; // ถ้าอยู่ในโหมดแก้ไขไม่ต้องทำงานซ้อนกัน
            
            const carIdInput = this.value.trim();
            let fleetData = JSON.parse(localStorage.getItem('fleetLogs')) || [];
            
            // ค้นหาข้อมูลล่าสุดของทะเบียนนี้ในระบบ (กรองจากหลังสุดมาหน้าสุด)
            const lastRecord = fleetData.slice().reverse().find(item => item.carId === carIdInput);
            const hintSpan = document.getElementById('mileHint');
            
            if (lastRecord) {
                hintSpan.style.color = "var(--primary)";
                hintSpan.innerText = `💡 พบบันทึกครั้งล่าสุดของคันนี้: ไมล์อยู่ที่ ${lastRecord.currentOdometer.toLocaleString()} กม.`;
            } else {
                hintSpan.innerText = "";
            }
        });

        document.getElementById('fleetForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const carId = document.getElementById('carId').value.trim();
            const carType = document.getElementById('carType').value;
            const currentOdometer = parseFloat(document.getElementById('currentOdometer').value);
            const distance = parseFloat(document.getElementById('distance').value);
            const fuel = parseFloat(document.getElementById('fuel').value);
            
            const date = new Date().toLocaleDateString('th-TH');
            let fleetData = JSON.parse(localStorage.getItem('fleetLogs')) || [];

            // คำนวณอัตราสิ้นเปลืองน้ำมัน
            const consumption = (distance / fuel).toFixed(2);

            if (editIndex === -1) {
                // โหมดปกติ: บันทึกข้อมูลแถวใหม่ต่อท้าย Array
                fleetData.push({ date, carId, carType, currentOdometer, distance, fuel, consumption });
            } else {
                // โหมดแก้ไข: อัปเดตทับอินเดกซ์เดิมที่ระบุมา
                fleetData[editIndex] = { date, carId, carType, currentOdometer, distance, fuel, consumption };
            }

            // เซฟกลับลงเครื่องผ่านคีย์กลาง 'fleetLogs'
            localStorage.setItem('fleetLogs', JSON.stringify(fleetData));

            // แสดงสถานะบันทึกสำเร็จ
            const alertBox = document.getElementById('successAlert');
            alertBox.style.display = 'block';
            
            // ล้างฟอร์มและรีเซ็ตค่า
            document.getElementById('fleetForm').reset();
            document.getElementById('mileHint').innerText = "";
            
            if (editIndex !== -1) {
                // ถ้าแก้ไขเสร็จแล้วให้เตะผู้ใช้กลับไปหน้าประวัติหลังจากผ่านไป 1.5 วินาที
                setTimeout(() => { window.location.href = 'history.html'; }, 1500);
            } else {
                setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
            }
        });
    </script>
</body>
</html>
