<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fleet - จัดการรถ</title>
    <style>
        :root {
            --primary: #4f46e5;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--background); color: var(--text-main); margin: 0; padding: 0; }
        .navbar { background: #0f172a; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .navbar-brand { font-size: 18px; font-weight: 700; }
        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-link { color: #94a3b8; text-decoration: none; padding: 8px 16px; font-size: 14px; font-weight: 600; border-radius: 6px; transition: all 0.2s; }
        .nav-link:hover { color: white; background: #1e293b; }
        .nav-link.active { color: white; background: var(--primary); }

        .main-content { padding: 40px 20px; max-width: 800px; margin: 0 auto; }
        h2 { font-size: 22px; font-weight: 600; margin: 0 0 4px 0; }
        .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; display: block; }

        /* --- Car Cards --- */
        .car-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 36px; }
        .car-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(15,23,42,0.04);
            transition: box-shadow 0.2s;
        }
        .car-card:hover { box-shadow: 0 4px 16px rgba(15,23,42,0.08); }
        .car-card.in-repair { border-left: 4px solid var(--danger); background: #fff8f8; }
        .car-card.normal { border-left: 4px solid var(--success); }

        .car-info { flex: 1; }
        .car-id { font-size: 16px; font-weight: 700; color: var(--primary); }
        .car-type { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
        .car-mile { font-size: 13px; color: var(--text-main); margin-top: 6px; font-weight: 500; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
        }
        .badge-ok { background: #d1fae5; color: #065f46; }
        .badge-repair { background: #fee2e2; color: #b91c1c; }

        .car-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-status {
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-to-repair { background: #fee2e2; color: #b91c1c; }
        .btn-to-repair:hover { background: #fca5a5; }
        .btn-to-ok { background: #d1fae5; color: #065f46; }
        .btn-to-ok:hover { background: #6ee7b7; }
        .btn-delete-car { background: #f1f5f9; color: var(--text-muted); }
        .btn-delete-car:hover { background: #fee2e2; color: var(--danger); }

        /* --- Add Car Form --- */
        .add-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(15,23,42,0.04); }
        .add-section h3 { font-size: 16px; font-weight: 600; margin: 0 0 20px 0; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 180px; margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 14px; background: #fcfdfe;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .btn-add {
            background: var(--primary); color: white;
            border: none; padding: 11px 24px;
            border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; width: 100%; margin-top: 4px;
        }
        .btn-add:hover { background: #4338ca; }

        .alert-box {
            padding: 12px 16px; border-radius: 8px; font-size: 14px;
            font-weight: 500; margin-bottom: 20px; display: none;
        }
        .alert-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }

        .section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--text-main); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">📊 Smart Fleet Analytics</div>
    <div class="nav-links">
        <a href="index.html" class="nav-link">📝 บันทึกข้อมูลการวิ่งรถ</a>
        <a href="history.html" class="nav-link">📋 ประวัติการวิ่งรถ</a>
        <a href="database.html" class="nav-link">📊 Dashboard &amp; แจ้งซ่อมบำรุง</a>
        <a href="manage.html" class="nav-link active">🚗 จัดการรถ</a>
        <a href="developer.html" class="nav-link">🧑‍💻 ผู้พัฒนาระบบ</a>
    </div>
</nav>

<div class="main-content">
    <h2>🚗 จัดการยานพาหนะในระบบ</h2>
    <span class="subtitle">หน่วยงานอำนวยความปลอดภัย แขวงทางหลวงชลบุรีที่ 2</span>

    <div class="alert-box alert-success" id="alertSuccess"></div>
    <div class="alert-box alert-error" id="alertError"></div>

    <!-- รายการรถ -->
    <div class="section-title">🚘 รายการยานพาหนะทั้งหมด</div>
    <div class="car-list" id="carList"></div>

    <!-- เพิ่มรถใหม่ -->
    <div class="add-section">
        <h3>➕ เพิ่มรถใหม่เข้าระบบ</h3>
        <div class="form-row">
            <div class="form-group">
                <label>รหัสพัสดุ / หมายเลขทะเบียน</label>
                <input type="text" id="newCarId" placeholder="เช่น 44-0680-18-0">
            </div>
            <div class="form-group">
                <label>ประเภทรถ</label>
                <select id="newCarType">
                    <option value="รถกระบะตรวจการ (ออกตรวจหน้างาน)">รถกระบะตรวจการ</option>
                    <option value="รถเครน">รถเครน</option>
                    <option value="รถบรรทุก">รถบรรทุก</option>
                </select>
            </div>
            <div class="form-group">
                <label>เลขไมล์ตั้งต้น (กม.)</label>
                <input type="number" id="newCarMile" placeholder="เช่น 0" min="0">
            </div>
        </div>
        <button class="btn-add" onclick="addCar()">➕ เพิ่มรถเข้าระบบ</button>
    </div>
</div>

<script>
    // === Seed ข้อมูลตัวอย่าง (รันครั้งเดียวตอนเปิดเว็บครั้งแรกในเบราว์เซอร์นี้) ===
    (function seedDemoData() {
        if (localStorage.getItem('fleetSeeded')) return; // เคย seed แล้ว ไม่ทำซ้ำ (เคารพการ "ล้างประวัติ" ของผู้ใช้)

        const seedFleet = [
            { id: '44-0680-18-0', type: 'รถกระบะตรวจการ (ออกตรวจหน้างาน)', lastMile: 296709, inRepair: false },
            { id: '74-6283-22-3', type: 'รถเครน',                              lastMile: 168120, inRepair: false },
            { id: '46-7126-20-7', type: 'รถบรรทุก',                            lastMile: 192514, inRepair: true  },
        ];

        const seedLogs = [
            { date: '11/6/2569', driverName: 'นายเฉลิมพล เอี่ยมสะอาด', carId: '44-0680-18-0', carType: 'รถกระบะตรวจการ (ออกตรวจหน้างาน)', currentOdometer: 296850, distance: 141, fuel: 12,   consumption: '11.75' },
            { date: '17/6/2569', driverName: 'นายเสกสันต์ รังกลาง',   carId: '44-0680-18-0', carType: 'รถกระบะตรวจการ (ออกตรวจหน้างาน)', currentOdometer: 297005, distance: 155, fuel: 13,   consumption: '11.92' },
            { date: '23/6/2569', driverName: 'นายชาญกิจ โชติกาญ',     carId: '44-0680-18-0', carType: 'รถกระบะตรวจการ (ออกตรวจหน้างาน)', currentOdometer: 297190, distance: 185, fuel: 15.5, consumption: '11.94' },

            { date: '12/6/2569', driverName: 'นายเสกสันต์ รังกลาง',   carId: '74-6283-22-3', carType: 'รถเครน', currentOdometer: 168350, distance: 230, fuel: 28, consumption: '8.21' },
            { date: '18/6/2569', driverName: 'นายชาญกิจ โชติกาญ',     carId: '74-6283-22-3', carType: 'รถเครน', currentOdometer: 168570, distance: 220, fuel: 27, consumption: '8.15' },
            { date: '24/6/2569', driverName: 'นายเฉลิมพล เอี่ยมสะอาด', carId: '74-6283-22-3', carType: 'รถเครน', currentOdometer: 168800, distance: 230, fuel: 29, consumption: '7.93' },

            { date: '08/6/2569', driverName: 'นายชาญกิจ โชติกาญ',     carId: '46-7126-20-7', carType: 'รถบรรทุก', currentOdometer: 192700, distance: 186, fuel: 31, consumption: '6.00' },
            { date: '13/6/2569', driverName: 'นายเฉลิมพล เอี่ยมสะอาด', carId: '46-7126-20-7', carType: 'รถบรรทุก', currentOdometer: 192910, distance: 210, fuel: 33, consumption: '6.36' },
        ];

        localStorage.setItem('fleetMaster', JSON.stringify(seedFleet));
        localStorage.setItem('fleetLogs', JSON.stringify(seedLogs));
        localStorage.setItem('fleetSeeded', 'true');
    })();

    // ข้อมูลรถเริ่มต้น (โหลดครั้งแรกถ้ายังไม่มีใน localStorage)
    const DEFAULT_FLEET = [
        { id: '44-0680-18-0', type: 'รถกระบะตรวจการ (ออกตรวจหน้างาน)', lastMile: 296709, inRepair: false },
        { id: '74-6283-22-3', type: 'รถเครน',                              lastMile: 168120, inRepair: false },
        { id: '46-7126-20-7', type: 'รถบรรทุก',                            lastMile: 192514, inRepair: true  },
    ];

    function getFleetMaster() {
        const saved = localStorage.getItem('fleetMaster');
        if (saved) return JSON.parse(saved);
        // โหลดค่าตั้งต้นครั้งแรก
        localStorage.setItem('fleetMaster', JSON.stringify(DEFAULT_FLEET));
        return DEFAULT_FLEET;
    }

    function saveFleetMaster(data) {
        localStorage.setItem('fleetMaster', JSON.stringify(data));
    }

    function showAlert(type, msg) {
        const el = document.getElementById(type === 'success' ? 'alertSuccess' : 'alertError');
        const other = document.getElementById(type === 'success' ? 'alertError' : 'alertSuccess');
        other.style.display = 'none';
        el.innerText = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function renderCarList() {
        const fleet = getFleetMaster();
        const list = document.getElementById('carList');
        list.innerHTML = '';

        if (fleet.length === 0) {
            list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:30px;">ยังไม่มีรถในระบบ</div>';
            return;
        }

        // ดึงเลขไมล์ล่าสุดจากประวัติการวิ่ง
        const logs = JSON.parse(localStorage.getItem('fleetLogs')) || [];

        fleet.forEach((car, idx) => {
            const lastLog = logs.slice().reverse().find(l => l.carId === car.id);
            const latestMile = lastLog ? parseFloat(lastLog.currentOdometer) : car.lastMile;

            const card = document.createElement('div');
            card.className = 'car-card ' + (car.inRepair ? 'in-repair' : 'normal');
            card.innerHTML = `
                <div class="car-info">
                    <div class="car-id">${car.id}</div>
                    <div class="car-type">${car.type}</div>
                    <div class="car-mile">📍 เลขไมล์ล่าสุด: <strong>${latestMile.toLocaleString()} กม.</strong></div>
                    <span class="status-badge ${car.inRepair ? 'badge-repair' : 'badge-ok'}">
                        ${car.inRepair ? '🔧 อยู่ระหว่างซ่อม' : '✅ พร้อมใช้งาน'}
                    </span>
                </div>
                <div class="car-actions">
                    ${car.inRepair
                        ? `<button class="btn-status btn-to-ok" onclick="toggleRepair(${idx}, false)">✅ ซ่อมเสร็จแล้ว</button>`
                        : `<button class="btn-status btn-to-repair" onclick="toggleRepair(${idx}, true)">🔧 ส่งซ่อม</button>`
                    }
                    <button class="btn-status btn-delete-car" onclick="deleteCar(${idx})">🗑️</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function toggleRepair(idx, toRepair) {
        const fleet = getFleetMaster();
        fleet[idx].inRepair = toRepair;
        saveFleetMaster(fleet);
        renderCarList();
        showAlert('success', toRepair
            ? `🔧 เปลี่ยนสถานะ ${fleet[idx].id} → อยู่ระหว่างซ่อมบำรุง`
            : `✅ เปลี่ยนสถานะ ${fleet[idx].id} → พร้อมใช้งานแล้ว`
        );
    }

    function deleteCar(idx) {
        const fleet = getFleetMaster();
        const car = fleet[idx];
        if (!confirm(`⚠️ ต้องการลบ "${car.id}" ออกจากระบบ?\nประวัติการวิ่งจะยังคงอยู่`)) return;
        fleet.splice(idx, 1);
        saveFleetMaster(fleet);
        renderCarList();
        showAlert('success', `🗑️ ลบ ${car.id} ออกจากระบบแล้ว`);
    }

    function addCar() {
        const id   = document.getElementById('newCarId').value.trim();
        const type = document.getElementById('newCarType').value;
        const mile = parseFloat(document.getElementById('newCarMile').value) || 0;

        if (!id) { showAlert('error', '❌ กรุณากรอกรหัสพัสดุ / หมายเลขทะเบียน'); return; }

        const fleet = getFleetMaster();
        if (fleet.find(c => c.id === id)) { showAlert('error', `❌ ทะเบียน "${id}" มีในระบบแล้ว`); return; }

        fleet.push({ id, type, lastMile: mile, inRepair: false });
        saveFleetMaster(fleet);
        renderCarList();

        document.getElementById('newCarId').value = '';
        document.getElementById('newCarMile').value = '';
        showAlert('success', `✅ เพิ่มรถ "${id}" เข้าระบบเรียบร้อย`);
    }

    // เริ่มต้น
    renderCarList();
</script>
</body>
</html>
